name: Sync Zotero References
on:
  schedule:
    - cron: '0 8 * * 1'
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Run Zotero sync script
        run: python scripts/generate_sota.py
        env:
          ZOTERO_API_KEY:         ${{ secrets.ZOTERO_API_KEY }}
          ZOTERO_GROUP_ID_P3579:  ${{ secrets.ZOTERO_GROUP_ID_P3579 }}
          ZOTERO_GROUP_ID_P3998:  ${{ secrets.ZOTERO_GROUP_ID_P3998 }}

      - name: Open Pull Request if changes
        uses: peter-evans/create-pull-request@v7
        with:
          token:          ${{ secrets.GITHUB_TOKEN }}
          title:          "refs: Zotero sync"
          branch:         zotero-sync
          commit-message: "refs: update SOTA from Zotero"
          body: |
            Automatic sync from Zotero Group Libraries.
            Please review the changes before merging.
